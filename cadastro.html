<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastre-se Aqui!</title>
    <link rel="stylesheet" href="cadastro.css">
    <link rel="shortcut icon" href="imagem/logo.png" type="image/x-icon">
</head>

<body>
    <main>
        <div class="div-cadastro">
            <h2>Cadastre-se Aqui!</h2>
            <p>Não fique de fora! Cadastre-se e aproveite todas as nossas novidades.</p>
        </div>

        <div class="cadastro-form">
            <h2>Cadastre-se</h2>
            <form action="">
                <div class="input-group">
                    <label for="Nome">Nome</label>
                    <input type="text" placeholder="Digite seu Nome" required>
                </div>

                <div class="input-group">
                    <label for="Sobrenome">Sobrenome</label>
                    <input type="text" placeholder="Digite seu Sobrenome" required>
                </div>

                <div class="input-group">
                    <label for="E-mail">E-mail</label>
                    <input type="email" placeholder="Digite seu E-mail">
                </div>

                <div class="input-group">
                    <label for="Senha">Senha</label>
                    <input type="password" placeholder="Digite sua Senha">
                    <input type="password" placeholder="Corfime sua Senha">
                </div>

                <input type="submit" class="bnt" value="Criar Conta">
                <div class="cadastro-link">
                    <a href="form.html">Já tenho uma Conta</a>
                </div>
            
            </form>
        </div>
    </main>
</body>

</html>
